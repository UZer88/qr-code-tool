name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y libzbar0 libzbar-dev

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest

    - name: Run tests
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ -v

    - name: Build Docker image
      run: |
        docker build -t qr-code-tool .
        docker run --rm qr-code-tool python cli.py generate "test" -o /tmp/test.png